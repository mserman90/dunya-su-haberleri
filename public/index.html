<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dünya Su Haberleri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        #map { height: 100vh; width: 100%; }
        .news-card { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }
        .news-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .filter-btn { transition: all 0.2s; white-space: nowrap; }
        .filter-btn.active { font-weight: 600; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50">
    <header class="bg-white border-b shadow-sm sticky top-0 z-[1000]">
        <div class="max-w-screen-2xl mx-auto px-4 py-3">
            <div class="flex items-center justify-between gap-4 flex-wrap mb-3">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-2xl">💧</div>
                    <div>
                        <h1 class="text-xl font-semibold text-gray-900">Dünya Su Haberleri</h1>
                        <p class="text-xs text-gray-500">Global Su Yönetimi Takip Platformu</p>
                    </div>
                </div>
                <div class="flex-1 max-w-2xl flex items-center gap-2">
                    <div class="relative flex-1">
                        <input type="text" id="search-input" oninput="loadNews()" placeholder="Haber, ülke veya bölge ara..." class="w-full pl-10 pr-4 py-2 border rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
                        <span class="absolute left-3 top-2.5 text-gray-400">🔍</span>
                    </div>
                    <select id="time-filter" onchange="loadNews()" class="text-xs border rounded-lg px-2 py-2 bg-white outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer">
                        <option value="all">Tüm Zamanlar</option>
                        <option value="day">Son 24 Saat</option>
                        <option value="week">Son 1 Hafta</option>
                        <option value="month">Son 1 Ay</option>
                        <option value="year" selected>Son 1 Yıl</option>
                    </select>
                    <select id="sort-order" onchange="loadNews()" class="text-xs border rounded-lg px-2 py-2 bg-white outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer">
                        <option value="newest">En Yeni</option>
                        <option value="oldest">En Eski</option>
                    </select>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="stopSpeech()" class="text-xs bg-red-50 text-red-600 px-3 py-2 rounded-lg font-medium hover:bg-red-100 transition-colors hidden" id="stop-speech-btn">
                        ⏹ Sesi Durdur
                    </button>
                </div>
            </div>
            <div class="flex items-center gap-2 overflow-x-auto pb-1 scrollbar-hide">
                <button onclick="setRegion('all')" id="btn-all" class="filter-btn active bg-gray-800 text-white px-4 py-2 rounded-full text-xs">🌎 Tümü</button>
                <button onclick="setRegion('europe')" id="btn-europe" class="filter-btn bg-white border px-4 py-2 rounded-full text-xs">🇪🇺 Avrupa</button>
                <button onclick="setRegion('africa')" id="btn-africa" class="filter-btn bg-white border px-4 py-2 rounded-full text-xs">🌍 Afrika</button>
                <button onclick="setRegion('america')" id="btn-america" class="filter-btn bg-white border px-4 py-2 rounded-full text-xs">🌎 Amerika</button>
                <button onclick="setRegion('asia')" id="btn-asia" class="filter-btn bg-white border px-4 py-2 rounded-full text-xs">🌏 Asya</button>
                <button onclick="setRegion('oceania')" id="btn-oceania" class="filter-btn bg-white border px-4 py-2 rounded-full text-xs">🌏 Okyanusya</button>
                <button onclick="setRegion('arab')" id="btn-arab" class="filter-btn bg-white border px-4 py-2 rounded-full text-xs">🇸🇦 Arap Dünyası</button>
                <button onclick="setRegion('central-asia')" id="btn-central-asia" class="filter-btn bg-white border px-4 py-2 rounded-full text-xs">🌏 Orta Asya</button>
            </div>
        </div>
    </header>
    <main class="flex h-[calc(100vh-125px)] overflow-hidden">
        <aside class="w-96 bg-white border-r overflow-y-auto p-4 hidden md:block">
            <div id="news-list" class="space-y-4"></div>
        </aside>
        <div id="map" class="flex-1"></div>
    </main>
    <script>
        const map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);
        const markers = L.layerGroup().addTo(map);
        const rivers = L.layerGroup().addTo(map);
        let currentRegion = 'all';
        let synth = window.speechSynthesis;
        const regions = {
            'all': { center: [20, 0], zoom: 2 },
            'europe': { center: [48, 15], zoom: 4 },
            'africa': { center: [5, 20], zoom: 3 },
            'america': { center: [10, -80], zoom: 3 },
            'asia': { center: [35, 100], zoom: 3 },
            'oceania': { center: [-25, 140], zoom: 4 },
            'arab': { center: [25, 45], zoom: 4 },
            'central-asia': { center: [42, 65], zoom: 5 }
        };
        const riverPaths = [
            { coords: [[48.1,11.6],[45.2,29.6]], color: '#2ecc71', name: 'Tuna Nehri' },
            { coords: [[-0.5,33.5],[31.5,31.2]], color: '#3498db', name: 'Nil Nehri' },
            { coords: [[-3.1,-60.0],[-1.4,-48.5]], color: '#f1c40f', name: 'Amazon Nehri' },
            { coords: [[-34.0,140.0],[-36.0,145.0]], color: '#1abc9c', name: 'Murray Nehri' },
            { coords: [[25.3,82.9],[22.0,88.0]], color: '#9b59b6', name: 'Ganj Nehri' }
        ];
        function drawRivers() {
            riverPaths.forEach(p => {
                L.polyline(p.coords, { color: p.color, weight: 3, opacity: 0.5 }).addTo(rivers).bindTooltip(p.name);
            });
        }
        function speakText(text) {
            stopSpeech();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'tr-TR';
            utterance.onstart = () => document.getElementById('stop-speech-btn').classList.remove('hidden');
            utterance.onend = () => document.getElementById('stop-speech-btn').classList.add('hidden');
            synth.speak(utterance);
        }
        function stopSpeech() {
            synth.cancel();
            document.getElementById('stop-speech-btn').classList.add('hidden');
        }
        async function loadNews() {
            try {
                const res = await fetch('/api/news');
                let news = await res.json();
                const searchTerm = document.getElementById('search-input').value.toLowerCase();
                const timeFilter = document.getElementById('time-filter').value;
                const sortOrder = document.getElementById('sort-order').value;
                
                markers.clearLayers();
                const list = document.getElementById('news-list');
                list.innerHTML = '';
                
                let filtered = currentRegion === 'all' ? news : news.filter(n => n.region === currentRegion);
                
                // Tarih Filtresi
                if (timeFilter !== 'all') {
                    const now = new Date();
                    let cutoff = new Date();
                    if (timeFilter === 'day') cutoff.setDate(now.getDate() - 1);
                    else if (timeFilter === 'week') cutoff.setDate(now.getDate() - 7);
                    else if (timeFilter === 'month') cutoff.setMonth(now.getMonth() - 1);
                    else if (timeFilter === 'year') cutoff.setFullYear(now.getFullYear() - 1);
                    
                    filtered = filtered.filter(n => new Date(n.date) >= cutoff);
                }

                // Arama Filtresi
                if (searchTerm) {
                    filtered = filtered.filter(n => 
                        n.title.toLowerCase().includes(searchTerm) || 
                        n.description.toLowerCase().includes(searchTerm) ||
                        n.country.toLowerCase().includes(searchTerm)
                    );
                }

                // Sıralama
                filtered.sort((a, b) => {
                    const dateA = new Date(a.date);
                    const dateB = new Date(b.date);
                    return sortOrder === 'newest' ? dateB - dateA : dateA - dateB;
                });

                filtered.forEach(item => {
                    const marker = L.marker([item.lat, item.lng]).addTo(markers);
                    marker.bindPopup(`<b>${item.title}</b><br><small>${item.description}</small>`);
                    
                    const card = document.createElement('div');
                    card.className = 'news-card bg-white p-4 rounded-xl border border-gray-100 cursor-pointer shadow-sm relative group';
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-1">
                            <span class="text-[10px] font-bold text-blue-600 uppercase tracking-wider">${item.country}</span>
                            <span class="text-[10px] text-gray-400">${item.date}</span>
                        </div>
                        <h4 class="font-bold text-gray-900 text-sm mb-1">${item.title}</h4>
                        <p class="text-xs text-gray-500 line-clamp-2 mb-3">${item.description}</p>
                        <div class="flex items-center gap-2">
                            <button onclick="event.stopPropagation(); speakText('${item.title}. ${item.description}')" class="text-[10px] bg-blue-50 text-blue-600 px-2 py-1 rounded hover:bg-blue-100 transition-colors flex items-center gap-1">
                                🔊 Dinle
                            </button>
                            <span class="text-[10px] text-blue-500 font-medium opacity-0 group-hover:opacity-100 transition-opacity">Haritada Göster</span>
                        </div>
                    `;
                    card.onclick = () => { map.setView([item.lat, item.lng], 6); marker.openPopup(); };
                    list.appendChild(card);
                });
                
                if (filtered.length === 0) {
                    list.innerHTML = '<p class="text-center text-gray-400 text-sm mt-10">Sonuç bulunamadı.</p>';
                }
            } catch (err) { console.error(err); }
        }
        function setRegion(region) {
            currentRegion = region;
            const config = regions[region];
            map.flyTo(config.center, config.zoom);
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-gray-800', 'text-white');
                btn.classList.add('bg-white', 'text-gray-800', 'border');
            });
            const activeBtn = document.getElementById('btn-' + region);
            activeBtn.classList.add('active', 'bg-gray-800', 'text-white');
            activeBtn.classList.remove('bg-white', 'border');
            loadNews();
        }
        drawRivers();
        loadNews();
    </script>
</body>
</html>
